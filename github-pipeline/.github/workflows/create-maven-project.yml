name: Create and Push Java Maven Project

on:
  workflow_dispatch:
    inputs:
      repo_name:
        description: 'Repository name to create'
        required: true
        default: 'my-java-maven-project'
      repo_visibility:
        description: 'Repository visibility'
        required: true
        default: 'private'
        type: choice
        options:
          - public
          - private

jobs:
  create-and-push:
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: Checkout this workflow repo
      - name: Checkout current repository
        uses: actions/checkout@v4
        
      # Step 2: Set up Java and Maven
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      # Step 3: Generate Maven project structure
      - name: Generate Maven project
        run: |
          # Create project directory
          mkdir -p ${{ github.workspace }}/target-project
          cd ${{ github.workspace }}/target-project
          
          # Generate Maven project interactively (non-interactive)
          mvn archetype:generate \
            -DgroupId=com.example \
            -DartifactId=${{ github.event.inputs.repo_name }} \
            -DarchetypeArtifactId=maven-archetype-quickstart \
            -DarchetypeVersion=1.4 \
            -DinteractiveMode=false
          
      # Step 4: Initialize Git and configure
      - name: Initialize Git
        run: |
          cd ${{ github.workspace }}/target-project/${{ github.event.inputs.repo_name }}
          
          # Configure Git
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Initialize repo if needed
          git init
          git add .
          git commit -m "Initial commit: Java Maven project"
          
      # Step 5: Create GitHub repository using GitHub CLI
      - name: Create GitHub Repository
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check if repo exists, if not create it
          if ! gh repo view ${{ github.repository_owner }}/${{ github.event.inputs.repo_name }} 2>/dev/null; then
            gh repo create ${{ github.event.inputs.repo_name }} \
              --${{ github.event.inputs.repo_visibility }} \
              --source . \
              --description "Java Maven project created via GitHub Actions" \
              --push
          else
            echo "Repository already exists, pushing to existing repo"
            gh repo clone ${{ github.event.inputs.repo_name }} temp-repo -- --depth 1 || true
          fi
          
      # Step 6: Push to GitHub with dynamic authentication
      - name: Push to GitHub
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd ${{ github.event.inputs.repo_name }}
          
          # Add remote with token-based authentication
          git remote add origin https://github.com/${{ github.repository_owner }}/${{ github.event.inputs.repo_name }}.git
          
          # Push using GitHub token for authentication
          git push -u origin main || git push -u origin master